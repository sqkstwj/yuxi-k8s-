apiVersion: v1
kind: Secret
metadata:
  name: yuxi-registry-secret
  namespace: yuxi
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "hub.uimpcloud.com": {
          "username": "<CHANGE_ME_REGISTRY_USERNAME>",
          "password": "<CHANGE_ME_REGISTRY_PASSWORD>",
          "auth": "<CHANGE_ME_BASE64_USERNAME_COLON_PASSWORD>"
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yuxi-config
  namespace: yuxi
data:
  SAVE_DIR: /app/saves
  LITE_MODE: "false"
  RUNNING_IN_DOCKER: "true"
  MODEL_DIR_IN_DOCKER: /models
  PYTHONPATH: /app/package
  HOST_IP: ""
  REDIS_URL: redis://redis:6379/0
  MINIO_URI: http://minio:9000
  NEO4J_URI: bolt://neo4j:7687
  MILVUS_URI: http://milvus:19530
  SUMMARY_LANGUAGE: Chinese
  SANDBOX_PROVIDER: provisioner
  SANDBOX_PROVISIONER_URL: http://sandbox-provisioner:8002
  SANDBOX_VIRTUAL_PATH_PREFIX: /home/gem/user-data
  SANDBOX_EXEC_TIMEOUT_SECONDS: "180"
  SANDBOX_MAX_OUTPUT_BYTES: "262144"
  SANDBOX_KEEPALIVE_INTERVAL_SECONDS: "30"
  NO_PROXY: localhost,127.0.0.1,postgres,redis,minio,neo4j,milvus,etcd,sandbox-provisioner
  no_proxy: localhost,127.0.0.1,postgres,redis,minio,neo4j,milvus,etcd,sandbox-provisioner
  PROVISIONER_BACKEND: kubernetes
  SANDBOX_IMAGE: hub.uimpcloud.com/yuxi/all-in-one-sandbox:0.6.0
  SANDBOX_CONTAINER_PORT: "8080"
  SANDBOX_HEALTH_TIMEOUT_SECONDS: "300"
  SANDBOX_IDLE_TIMEOUT_SECONDS: "120"
  SANDBOX_IDLE_CHECK_INTERVAL_SECONDS: "10"
  K8S_NAMESPACE: yuxi
  THREAD_PVC: yuxi-shared-data
  SKILLS_PVC: yuxi-shared-data
  K8S_SERVICE_TYPE: ClusterIP
  K8S_CLUSTER_DOMAIN: cluster.local
  K8S_IMAGE_PULL_SECRET: yuxi-registry-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: yuxi-secret
  namespace: yuxi
type: Opaque
stringData:
  POSTGRES_USER: "<CHANGE_ME_POSTGRES_USER>"
  POSTGRES_PASSWORD: "<CHANGE_ME_POSTGRES_PASSWORD>"
  POSTGRES_DB: "<CHANGE_ME_POSTGRES_DB>"
  POSTGRES_URL: "postgresql+asyncpg://<CHANGE_ME_POSTGRES_USER>:<CHANGE_ME_POSTGRES_PASSWORD>@postgres:5432/<CHANGE_ME_POSTGRES_DB>"
  NEO4J_USERNAME: "<CHANGE_ME_NEO4J_USERNAME>"
  NEO4J_PASSWORD: "<CHANGE_ME_NEO4J_PASSWORD>"
  MINIO_ACCESS_KEY: "<CHANGE_ME_MINIO_ACCESS_KEY>"
  MINIO_SECRET_KEY: "<CHANGE_ME_MINIO_SECRET_KEY>"
  SILICONFLOW_API_KEY: "<CHANGE_ME_SILICONFLOW_API_KEY>"
  TAVILY_API_KEY: "<CHANGE_ME_TAVILY_API_KEY>"
---

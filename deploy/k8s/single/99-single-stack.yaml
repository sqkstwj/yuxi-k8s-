apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: yuxi
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: http
    - name: bolt
      port: 7687
      targetPort: bolt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: yuxi
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: yuxi-registry-secret
      securityContext:
        fsGroup: 7474
      containers:
        - name: neo4j
          image: hub.uimpcloud.com/yuxi/neo4j:5.26
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_NEO4J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: yuxi-secret
                  key: NEO4J_USERNAME
            - name: APP_NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yuxi-secret
                  key: NEO4J_PASSWORD
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: yuxi-secret
                  key: NEO4J_AUTH
            - name: NEO4J_server_bolt_listen__address
              value: 0.0.0.0:7687
            - name: NEO4J_server_http_listen__address
              value: 0.0.0.0:7474
            - name: ENTITY_EMBEDDING
              value: "true"
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - cypher-shell -a bolt://localhost:7687 -u "$APP_NEO4J_USERNAME" -p "$APP_NEO4J_PASSWORD" 'RETURN 1;' >/dev/null
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 20
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - cypher-shell -a bolt://localhost:7687 -u "$APP_NEO4J_USERNAME" -p "$APP_NEO4J_PASSWORD" 'RETURN 1;' >/dev/null
            initialDelaySeconds: 20
            timeoutSeconds: 10
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - cypher-shell -a bolt://localhost:7687 -u "$APP_NEO4J_USERNAME" -p "$APP_NEO4J_PASSWORD" 'RETURN 1;' >/dev/null
            initialDelaySeconds: 90
            timeoutSeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-data
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: yuxi
spec:
  type: ClusterIP
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: yuxi
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: yuxi-registry-secret
      containers:
        - name: etcd
          image: hub.uimpcloud.com/yuxi/etcd:v3.5.5
          imagePullPolicy: IfNotPresent
          command:
            - etcd
            - --advertise-client-urls=http://etcd:2379
            - --listen-client-urls
            - http://0.0.0.0:2379
            - --data-dir
            - /etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
            - name: ETCDCTL_API
              value: "3"
          ports:
            - containerPort: 2379
              name: client
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd
          readinessProbe:
            exec:
              command:
                - etcdctl
                - --endpoints=http://127.0.0.1:2379
                - endpoint
                - health
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - etcdctl
                - --endpoints=http://127.0.0.1:2379
                - endpoint
                - health
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: etcd-data
          persistentVolumeClaim:
            claimName: etcd-data
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: yuxi
spec:
  type: ClusterIP
  selector:
    app: milvus
  ports:
    - name: milvus
      port: 19530
      targetPort: milvus
    - name: health
      port: 9091
      targetPort: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: yuxi
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      imagePullSecrets:
        - name: yuxi-registry-secret
      containers:
        - name: milvus
          image: hub.uimpcloud.com/yuxi/milvus:v2.5.6
          imagePullPolicy: IfNotPresent
          command:
            - milvus
            - run
            - standalone
          env:
            - name: ETCD_ENDPOINTS
              value: etcd:2379
            - name: MINIO_ADDRESS
              value: minio:9000
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: yuxi-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: yuxi-secret
                  key: MINIO_SECRET_KEY
            - name: MILVUS_LOG_LEVEL
              value: error
          ports:
            - containerPort: 19530
              name: milvus
            - containerPort: 9091
              name: health
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: milvus-data
---

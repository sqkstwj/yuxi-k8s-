apiVersion: v1
kind: Service
metadata:
  name: sandbox-provisioner
  namespace: yuxi
spec:
  type: ClusterIP
  selector:
    app: sandbox-provisioner
  ports:
    - name: http
      port: 8002
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-provisioner
  namespace: yuxi
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: sandbox-provisioner
  template:
    metadata:
      labels:
        app: sandbox-provisioner
    spec:
      serviceAccountName: yuxi-provisioner
      imagePullSecrets:
        - name: yuxi-registry-secret
      containers:
        - name: sandbox-provisioner
          image: hub.uimpcloud.com/yuxi/yuxi-sandbox-provisioner:0.6.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: yuxi-config
          ports:
            - containerPort: 8002
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: yuxi
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 5050
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: yuxi
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: yuxi-registry-secret
      containers:
        - name: api
          image: hub.uimpcloud.com/yuxi/yuxi-api:0.6.0
          imagePullPolicy: IfNotPresent
          command:
            - uv
            - run
            - --no-dev
            - uvicorn
            - server.main:app
            - --host
            - 0.0.0.0
            - --port
            - "5050"
          envFrom:
            - configMapRef:
                name: yuxi-config
            - secretRef:
                name: yuxi-secret
          ports:
            - containerPort: 5050
              name: http
          volumeMounts:
            - name: shared-data
              mountPath: /app/saves
          startupProbe:
            httpGet:
              path: /api/system/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/system/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/system/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: yuxi-shared-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: yuxi
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: yuxi-registry-secret
      containers:
        - name: worker
          image: hub.uimpcloud.com/yuxi/yuxi-api:0.6.0
          imagePullPolicy: IfNotPresent
          command:
            - uv
            - run
            - --no-dev
            - arq
            - server.worker_main.WorkerSettings
          envFrom:
            - configMapRef:
                name: yuxi-config
            - secretRef:
                name: yuxi-secret
          volumeMounts:
            - name: shared-data
              mountPath: /app/saves
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: yuxi-shared-data
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: yuxi
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: yuxi
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: yuxi-registry-secret
      containers:
        - name: web
          image: hub.uimpcloud.com/yuxi/yuxi-web:0.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yuxi-web
  namespace: yuxi
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80


apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: yuxi
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: yuxi-registry-secret
      containers:
        - name: milvus
          image: hub.uimpcloud.com/yuxi/milvus:v2.5.6
          imagePullPolicy: IfNotPresent
          command:
            - milvus
            - run
            - standalone
          env:
            - name: ETCD_ENDPOINTS
              value: etcd:2379
            - name: MINIO_ADDRESS
              value: minio:9000
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: yuxi-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: yuxi-secret
                  key: MINIO_SECRET_KEY
            - name: MILVUS_LOG_LEVEL
              value: error
          ports:
            - containerPort: 19530
              name: milvus
            - containerPort: 9091
              name: health
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: milvus-data
